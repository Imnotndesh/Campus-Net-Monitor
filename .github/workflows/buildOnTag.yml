name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: true
        default: 'v0.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from git tag
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building firmware version: ${VERSION}"

      - name: Update version in main.cpp
        run: |
          python .github/scripts/update_version.py ${{ steps.version.outputs.VERSION }}

      - name: Build firmware
        run: |
          pio run --environment esp32doit-devkit-v1

      - name: Prepare release assets
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Create directory for assets
          mkdir -p release-assets
          
          # Copy the firmware binary (adjust path if your board/environment differs)
          cp .pio/build/esp32doit-devkit-v1/firmware.bin release-assets/
          
          # Rename with version
          cd release-assets
          mv firmware.bin "campus-monitor-${VERSION}.bin"
          
          # Create SHA256 checksum
          sha256sum "campus-monitor-${VERSION}.bin" > "campus-monitor-${VERSION}.bin.sha256"
          
          # Create simple manifest file
          cat > manifest.json << EOF
          {
            "version": "${VERSION}",
            "build_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit": "${{ github.sha }}",
            "filename": "campus-monitor-${VERSION}.bin"
          }
          EOF
          
          cd ..

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.VERSION }}
          path: release-assets/*
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/campus-monitor-${{ steps.version.outputs.VERSION }}.bin
            release-assets/campus-monitor-${{ steps.version.outputs.VERSION }}.bin.sha256
            release-assets/manifest.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          fail_on_unmatched_files: true

      - name: Upload to latest release (optional - for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: |
            release-assets/campus-monitor-${{ steps.version.outputs.VERSION }}.bin
            release-assets/campus-monitor-${{ steps.version.outputs.VERSION }}.bin.sha256
            release-assets/manifest.json
          generate_release_notes: true
          draft: false
          prerelease: true
          fail_on_unmatched_files: true